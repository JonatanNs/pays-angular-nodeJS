<div class="min-h-screen bg-base-100 p-6">

  <div class="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">

    @for (pays of listPays(); track pays.uuid) {

      <div class="card bg-base-200 shadow-xl border border-primary/20 hover:scale-105 transition-transform">

        <div class="card-body items-center text-center">

          <!-- Avatar -->
          <div class="avatar">
            <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
              <img src="https://img.daisyui.com/images/profile/demo/1@94.webp" />
            </div>
          </div>

          <!-- Nom -->
          <h2 class="card-title mt-2">{{ pays.name }}</h2>

          <!-- Code -->
          <p class="text-xs uppercase opacity-60">{{ pays.code }}</p>

          <!-- Actions -->
          <div class="card-actions flex flex-col w-full mt-4 gap-2">

            <a [routerLink]="pays.uuid" class="btn btn-primary w-full">
                Voir plus
            </a>

          </div>

        </div>

      </div>
    }
  </div>

</div>
