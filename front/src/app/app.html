<app-header  />
<main class="w-full min-h-screen">
  <div class="toast toast-top toast-end">
    @if (uiState.message()) {
      <div class="alert"
           [ngClass]="{
           'alert-success': uiState.type() === 'success',
           'alert-error': uiState.type() === 'error'
         }">
        <span>{{ uiState.message() }}</span>
      </div>
    }
  </div>
  <router-outlet />
</main>
<app-footer/>
